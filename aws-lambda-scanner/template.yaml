AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: EventBridge-driven AWS compliance scanner for lab S3 and EC2 events.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 60
    MemorySize: 256
    Architectures:
      - x86_64
    Environment:
      Variables:
        LOG_LEVEL: INFO

Resources:
  ComplianceScannerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ComplianceScannerLeastPrivilege
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Sid: ReadS3ExposureState
                Effect: Allow
                Action:
                  - s3:GetBucketAcl
                  - s3:GetBucketPolicyStatus
                  - s3:GetBucketPublicAccessBlock
                  - s3:ListAllMyBuckets
                Resource: "*"
              - Sid: DescribeEc2Instances
                Effect: Allow
                Action:
                  - ec2:DescribeInstances
                Resource: "*"

  ComplianceScannerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: lambda_function.handler
      Role: !GetAtt ComplianceScannerRole.Arn
      Events:
        ComplianceApiEvents:
          Type: EventBridgeRule
          Properties:
            Pattern:
              detail-type:
                - AWS API Call via CloudTrail
              detail:
                eventSource:
                  - s3.amazonaws.com
                  - ec2.amazonaws.com
                eventName:
                  - CreateBucket
                  - PutBucketAcl
                  - PutBucketPolicy
                  - PutPublicAccessBlock
                  - DeletePublicAccessBlock
                  - RunInstances

Outputs:
  ComplianceScannerFunctionName:
    Description: Lambda function name.
    Value: !Ref ComplianceScannerFunction
  ComplianceScannerLogGroup:
    Description: CloudWatch Logs group for evidence collection.
    Value: !Sub /aws/lambda/${ComplianceScannerFunction}
